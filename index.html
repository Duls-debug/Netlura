<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de Intro -->
    <div id="intro">
        <div class="logo">
            <span class="n">N</span><span class="etflix">ETFLIX</span>
        </div>
    </div>

    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <main>
        <h1>Quem está assistindo?</h1>
        <ul class="profiles-wrapper">
          <li>
            <ul class="profiles">
              <li class="profile">
                <a href="catalogo/catalogo.html" class="profile-link" data-nome="Douglas">
                  <figure>
                    <img src="assets/Perfil - 1.png" alt="Perfil do Douglas">
                    <figcaption>Douglas</figcaption>
                  </figure>
                </a>
              </li>
              <li class="profile">
                <a href="catalogo/catalogo.html" class="profile-link" data-nome="Natieli">
                  <figure>
                    <img src="assets/Perfil - 2.png" alt="Perfil da Natieli">
                    <figcaption>Natieli</figcaption>
                  </figure>
                </a>
              </li>
              <li class="profile">
                <a href="catalogo/catalogo.html" class="profile-link" data-nome="Natalícia">
                  <figure>
                    <img src="assets/Perfil - 3.png" alt="Perfil da Natalícia">
                    <figcaption>Natalícia</figcaption>
                  </figure>
                </a>
              </li>
            </ul>
          </li>
        </ul>
    </main> 
    <script src="script.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
